<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG Deck Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --border: #0f3460;
      --text: #e8e8e8;
      --accent: #e94560;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      padding: 0.6rem 1rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-family: 'Cinzel', serif;
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }
    .save-btn {
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .save-btn:hover { opacity: 0.9; }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .save-result {
      font-size: 0.85rem;
      color: #8f8;
      margin-left: 0.5rem;
    }
    .search-bar {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .search-bar .search-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .search-bar .deck-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
      flex-shrink: 0;
    }
    .search-bar .deck-actions .save-btn { flex-shrink: 0; }
    .search-bar input {
      flex: 1;
      max-width: 280px;
      padding: 0.4rem 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.95rem;
    }
    .search-bar input:disabled { opacity: 0.6; cursor: not-allowed; }
    .search-bar .add-card-btn {
      padding: 0.4rem 0.8rem;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .search-bar .add-card-btn:hover:not(:disabled) { background: #1a4a7a; }
    .search-bar .add-card-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .search-bar .search-msg {
      font-size: 0.85rem;
      color: #a0a0a0;
    }
    .search-bar .search-msg.error { color: #f88; }
    .search-wrap { position: relative; display: inline-block; }
    .autocomplete-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      max-height: 240px;
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-top: 2px;
      z-index: 100;
      list-style: none;
      margin-left: 0;
      padding: 4px 0;
    }
    .autocomplete-dropdown li {
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .autocomplete-dropdown li:hover,
    .autocomplete-dropdown li.highlight { background: var(--border); }
    .adv-search-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
    }
    .adv-search-modal.open { display: flex; }
    .adv-search-modal .modal-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 100%;
      max-width: 920px;
      max-height: 90vh;
      overflow: hidden;
      position: relative;
    }
    .adv-search-modal .modal-close {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      z-index: 1001;
      width: 32px;
      height: 32px;
      padding: 0;
      background: var(--border);
      border: none;
      border-radius: 4px;
      color: var(--text);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
    }
    .adv-search-modal .modal-close:hover { background: var(--accent); }
    .export-format-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
    }
    .export-format-modal.open { display: flex; }
    .export-format-modal .modal-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-width: 320px;
      padding: 1rem 1.25rem;
      position: relative;
    }
    .export-format-modal .modal-close {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 28px;
      height: 28px;
      padding: 0;
      background: var(--border);
      border: none;
      border-radius: 4px;
      color: var(--text);
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
    }
    .export-format-modal .modal-close:hover { background: var(--accent); }
    .export-format-modal .modal-title {
      margin: 0 0 1rem 0;
      font-size: 1rem;
      color: var(--text);
    }
    .export-format-modal .format-btns {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .export-format-modal .format-btns button {
      padding: 0.5rem 1rem;
      background: var(--border);
      border: none;
      border-radius: 4px;
      color: var(--text);
      font-size: 0.95rem;
      cursor: pointer;
      text-align: left;
    }
    .export-format-modal .format-btns button:hover { background: #1a4a7a; }
    .import-format-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
    }
    .import-format-modal.open { display: flex; }
    .import-format-modal .modal-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-width: 420px;
      width: 100%;
      padding: 1rem 1.25rem;
      position: relative;
    }
    .import-format-modal .modal-close {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 28px;
      height: 28px;
      padding: 0;
      background: var(--border);
      border: none;
      border-radius: 4px;
      color: var(--text);
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
    }
    .import-format-modal .modal-close:hover { background: var(--accent); }
    .import-format-modal .modal-title {
      margin: 0 0 1rem 0;
      font-size: 1rem;
      color: var(--text);
    }
    .import-format-modal .import-textarea {
      width: 100%;
      min-height: 160px;
      padding: 0.5rem;
      margin-bottom: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
      box-sizing: border-box;
    }
    .import-format-modal .import-format-select {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.95rem;
    }
    .import-format-modal .import-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }
    .import-format-modal .import-actions button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .import-format-modal .import-actions .import-cancel-btn {
      background: var(--border);
      color: var(--text);
    }
    .import-format-modal .import-actions .import-cancel-btn:hover { background: #1a4a7a; }
    .import-format-modal .import-actions .import-submit-btn {
      background: var(--accent);
      color: #fff;
    }
    .import-format-modal .import-actions .import-submit-btn:hover { opacity: 0.9; }
    .import-format-modal .import-error {
      font-size: 0.85rem;
      color: #f88;
      margin-bottom: 0.5rem;
      min-height: 1.2em;
    }
    .adv-search-modal .modal-iframe {
      width: 100%;
      height: 85vh;
      min-height: 400px;
      border: none;
      display: block;
    }
    .tabs { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .tab-buttons {
      display: flex;
      gap: 0;
      padding: 0 1rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: #a0a0a0;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: calc(100vh - 220px);
      overflow: auto;
    }
    .tab-panel.active { display: flex; }
    .tab-panel#statisticsTab {
      padding: 1rem;
      background: var(--bg);
    }
    .main {
      display: flex;
      flex: 1;
      min-height: calc(100vh - 220px);
    }
    .deck-column {
      flex: 1;
      overflow: auto;
      padding: 1rem;
      border-right: 1px solid var(--border);
    }
    .removed-column {
      width: 280px;
      flex-shrink: 0;
      padding: 1rem;
      background: var(--panel);
    }
    .section {
      margin-bottom: 1rem;
    }
    .section-header {
      padding: 0.4rem 0.5rem;
      background: var(--border);
      border-radius: 4px 4px 0 0;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .section-header::before {
      content: '▾';
      font-size: 0.85rem;
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .section.collapsed .section-header { border-radius: 4px; }
    .section.collapsed .section-header::before { transform: rotate(-90deg); }
    .section.collapsed .section-body { display: none; }
    .section-header:hover { background: #1a4a7a; }
    .section-body {
      padding: 0.5rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 4px 4px;
      min-height: 44px;
    }
    .deck-section-controls {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }
    .deck-section-controls button {
      padding: 0.25rem 0.7rem;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .deck-section-controls button:hover { background: #1a4a7a; }
    .section-body.sortable-ghost { opacity: 0.4; }
    .section-statistics .section-body {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
    }
    .section-statistics .deck-stats-totals {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .section-statistics .deck-total-item {
      font-size: 0.95rem;
      color: var(--text);
      padding: 0.25rem 0.5rem;
    }
    .section-statistics .deck-total-item strong {
      color: var(--accent);
    }
    .section-statistics .deck-stats-colors {
      font-size: 0.9rem;
      color: var(--text);
    }
    .section-statistics .deck-stats-colors strong {
      color: var(--accent);
    }
    .section-statistics .deck-stats-color-line {
      font-family: var(--mono);
    }
    .deck-stats-charts {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-top: 1rem;
      align-items: flex-start;
    }
    .deck-stats-chart-wrap {
      flex: 1 1 200px;
      min-width: 200px;
      max-width: 280px;
    }
    .deck-stats-chart-wrap canvas {
      max-height: 200px;
    }
    .deck-stats-chart-wrap h4 {
      margin: 0 0 0.5rem 0;
      font-size: 0.95rem;
      color: #fff;
    }
    .card-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .card-list li {
      margin: 0;
      padding: 0;
    }
    .card-img {
      width: 150px;
      height: 210px;
      object-fit: cover;
      border-radius: 8px;
      cursor: grab;
      display: block;
    }
    .card-img:active { cursor: grabbing; }
    .card-img[data-name] { border: 1px solid var(--border); }
    .card-stack {
      position: relative;
      display: inline-block;
      margin: 0;
      padding: 0;
    }
    .card-stack .card-img { margin: 0; border-radius: 8px 8px 0 0; }
    .card-stack-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 4px 6px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
    }
    .card-stack-badge {
      min-width: 22px;
      padding: 2px 6px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      text-align: center;
      pointer-events: none;
    }
    .card-stack-controls {
      display: flex;
      gap: 4px;
      pointer-events: auto;
    }
    .card-stack-controls button {
      width: 28px;
      height: 28px;
      padding: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
    }
    .card-stack-controls button:hover { background: var(--border); }
    .removed-list {
      list-style: none;
      margin: 0;
      padding: 4px;
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 80px;
    }
    .removed-list li { margin: 0; padding: 0; }
    .removed-list .card-img { display: none !important; }
    .removed-list .card-stack:not(.maybe-board-item) {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-height: auto;
    }
    .removed-list .card-stack:not(.maybe-board-item)::before {
      content: attr(data-name);
      flex: 1;
      min-width: 0;
      font-size: 0.9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-stack.maybe-board-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: grab;
      min-width: 0;
    }
    .card-stack.maybe-board-item:active { cursor: grabbing; }
    .card-stack.maybe-board-item .maybe-board-name {
      flex: 1;
      min-width: 0;
      font-size: 0.9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sortable-drag { opacity: 0.8; }
    .card-preview {
      position: fixed;
      z-index: 10000;
      display: none;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      border: 2px solid var(--border);
      pointer-events: auto;
    }
    .card-preview.visible { display: block; }
    .card-preview img {
      width: 244px;
      height: 340px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>MTG Deck Editor</h1>
  </header>
  <div class="tabs">
    <div class="tab-buttons">
      <button type="button" class="tab-btn active" data-tab="board" id="tabBoard">Board</button>
      <button type="button" class="tab-btn" data-tab="statistics" id="tabStatistics">Statistics</button>
    </div>
    <div class="tab-panel active" id="boardTab">
      <div class="search-bar">
        <div class="search-group">
          <div class="search-wrap">
            <input type="text" id="cardSearch" placeholder="Search card by name..." title="Type a card name and click Add or press Enter" autocomplete="off">
            <ul class="autocomplete-dropdown" id="autocompleteDropdown" style="display: none;"></ul>
          </div>
          <button type="button" class="add-card-btn" id="addCardBtn" title="Add the searched card to the deck">Add to deck</button>
          <button type="button" class="add-card-btn" id="advancedSearchBtn" title="Open advanced search by criteria">Advanced Search</button>
          <span class="search-msg" id="searchMsg"></span>
        </div>
        <div class="deck-actions">
          <span class="save-result" id="saveResult"></span>
          <button type="button" class="save-btn" id="exportDecklistBtn" title="Export deck to clipboard (choose format)">Export</button>
          <button type="button" class="save-btn" id="importDeckBtn" title="Import deck from pasted list (choose format)">Import</button>
          <button type="button" class="save-btn" id="loadBtn">Load</button>
          <input type="file" id="loadFileInput" accept=".json" style="display: none">
          <button class="save-btn" id="saveBtn" disabled title="Opens save dialog (suggested name: deck_&lt;timestamp&gt;.json). Choose the decks folder in your repo to save there.">Save</button>
        </div>
      </div>
      <main class="main">
        <div class="deck-column">
          <div class="deck-section-controls">
            <button type="button" id="collapseAllBtn">Collapse All</button>
            <button type="button" id="expandAllBtn">Expand All</button>
          </div>
          <div id="deckSections"></div>
        </div>
        <div class="removed-column">
          <div class="section" id="section-maybe" data-type="maybe">
            <div class="section-header">Maybe Board (0)</div>
            <div class="section-body"><ul class="removed-list" id="list-maybe"></ul></div>
          </div>
          <div class="section" id="section-sideboard" data-type="sideboard">
            <div class="section-header">Sideboard (0)</div>
            <div class="section-body"><ul class="removed-list" id="list-sideboard"></ul></div>
          </div>
        </div>
      </main>
    </div>
    <div class="tab-panel" id="statisticsTab">
      <div id="statisticsContainer"></div>
    </div>
  </div>
  <div id="cardPreview" class="card-preview" aria-hidden="true"><img src="" alt=""></div>

  <div class="adv-search-modal" id="advSearchModal" aria-hidden="true">
    <div class="modal-content">
      <button type="button" class="modal-close" id="advSearchModalClose" aria-label="Close">×</button>
      <iframe class="modal-iframe" id="advSearchIframe" src="about:blank" title="Advanced Card Search"></iframe>
    </div>
  </div>

  <div class="export-format-modal" id="exportFormatModal" aria-hidden="true">
    <div class="modal-content">
      <button type="button" class="modal-close" id="exportFormatModalClose" aria-label="Close">×</button>
      <h3 class="modal-title">Export as</h3>
      <div class="format-btns" id="exportFormatButtons"></div>
    </div>
  </div>

  <div class="import-format-modal" id="importFormatModal" aria-hidden="true">
    <div class="modal-content">
      <button type="button" class="modal-close" id="importFormatModalClose" aria-label="Close">×</button>
      <h3 class="modal-title">Import deck</h3>
      <div class="import-error" id="importError"></div>
      <textarea class="import-textarea" id="importTextarea" placeholder="Paste decklist here…" aria-label="Decklist text"></textarea>
      <select class="import-format-select" id="importFormatSelect" aria-label="Import format">
        <option value="">Loading…</option>
      </select>
      <div class="import-actions">
        <button type="button" class="import-cancel-btn" id="importCancelBtn">Cancel</button>
        <button type="button" class="import-submit-btn" id="importSubmitBtn">Import</button>
      </div>
    </div>
  </div>

  <script>
    var statsPieChartInstance = null;
    var statsMvChartInstance = null;

    const TYPE_KEYS = [
      'creatures', 'non_creatures', 'spells', 'lands'
    ];
    const TYPE_LABELS = {
      creatures: 'Creatures',
      non_creatures: 'Non-creatures',
      spells: 'Spells',
      lands: 'Lands'
    };

    function scryfallImageUrl(name) {
      return 'https://api.scryfall.com/cards/named?exact=' + encodeURIComponent(name) + '&format=image&version=normal';
    }
    function scryfallImageUrlLarge(name) {
      return 'https://api.scryfall.com/cards/named?exact=' + encodeURIComponent(name) + '&format=image&version=large';
    }
    function showCardPreview(name, x, y) {
      var el = document.getElementById('cardPreview');
      if (!el || !name) return;
      var img = el.querySelector('img');
      img.src = scryfallImageUrlLarge(name);
      img.alt = name;
      el.style.left = (x + 16) + 'px';
      el.style.top = (y + 16) + 'px';
      el.classList.add('visible');
      el.setAttribute('aria-hidden', 'false');
    }
    function hideCardPreview() {
      var el = document.getElementById('cardPreview');
      if (el) {
        el.classList.remove('visible');
        el.setAttribute('aria-hidden', 'true');
      }
    }
    document.addEventListener('mouseover', function (e) {
      var preview = document.getElementById('cardPreview');
      if (e.target === preview || (preview && preview.contains(e.target))) return;
      var img = e.target.closest('.card-img');
      if (img) {
        var stack = img.closest('.card-stack');
        if (stack && stack.dataset.name) showCardPreview(stack.dataset.name, e.clientX, e.clientY);
      }
    });
    document.addEventListener('mouseout', function (e) {
      var img = e.target.closest('.card-img');
      var related = e.relatedTarget;
      var preview = document.getElementById('cardPreview');
      if (img && (!related || !img.contains(related)) && (!preview || !preview.contains(related))) hideCardPreview();
      if (preview && (e.target === preview || preview.contains(e.target)) && (!related || !preview.contains(related))) hideCardPreview();
    });
    document.addEventListener('mousemove', function (e) {
      var preview = document.getElementById('cardPreview');
      if (preview && preview.classList.contains('visible')) {
        var pw = preview.offsetWidth || 248;
        var ph = preview.offsetHeight || 344;
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var left = e.clientX + 16;
        var top = e.clientY + 16;
        if (left + pw > vw) left = e.clientX - pw - 8;
        if (top + ph > vh) top = e.clientY - ph - 8;
        if (left < 0) left = 0;
        if (top < 0) top = 0;
        preview.style.left = left + 'px';
        preview.style.top = top + 'px';
      }
    });

    function collapseToStacks(arr) {
      if (!Array.isArray(arr)) return [];
      var counts = {};
      for (var i = 0; i < arr.length; i++) {
        var n = arr[i];
        counts[n] = (counts[n] || 0) + 1;
      }
      return Object.keys(counts).map(function (name) { return { name: name, count: counts[name] }; });
    }

    function expandStacks(stacks) {
      var out = [];
      stacks.forEach(function (s) {
        for (var i = 0; i < (s.count || 1); i++) out.push(s.name);
      });
      return out;
    }

    var syncToServerTimer = null;
    function syncDeckToServer() {
      if (syncToServerTimer) clearTimeout(syncToServerTimer);
      syncToServerTimer = setTimeout(function () {
        syncToServerTimer = null;
        getDeckMeta().then(function (meta) {
          var state = collectState();
          var body = {
            name: meta.name,
            colors: meta.colors,
            description: meta.description,
            creatures: state.creatures,
            non_creatures: state.non_creatures,
            spells: state.spells,
            lands: state.lands,
            maybe: state.maybe,
            sideboard: state.sideboard
          };
          return fetch('/api/deck', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
        }).then(function (r) {
          if (r.ok) return r.json();
        }).catch(function () {});
      }, 400);
    }

    var SIDE_LABELS = { maybe: 'Maybe Board', sideboard: 'Sideboard' };

    function updateSectionHeaderTotal(listEl) {
      if (!listEl) return;
      var section = listEl.closest('.section');
      var typeKey = section ? section.dataset.type : null;
      var total = 0;
      listEl.querySelectorAll('.card-stack[data-count]').forEach(function (el) {
        total += parseInt(el.getAttribute('data-count') || '1', 10);
      });
      if (section && typeKey) {
        var label = TYPE_LABELS[typeKey] || SIDE_LABELS[typeKey] || typeKey;
        var header = section.querySelector('.section-header');
        if (header) header.textContent = label + ' (' + total + ')';
      }
      updateTotalsPanel();
      syncDeckToServer();
    }

    function makeCardStackEl(name, count) {
      count = Math.max(1, parseInt(count, 10) || 1);
      var li = document.createElement('li');
      li.style.listStyle = 'none';
      var wrap = document.createElement('div');
      wrap.className = 'card-stack';
      wrap.dataset.name = name;
      wrap.dataset.count = String(count);
      wrap.setAttribute('data-name', name);
      wrap.setAttribute('data-count', String(count));

      var img = document.createElement('img');
      img.className = 'card-img';
      img.src = scryfallImageUrl(name);
      img.alt = name;
      img.title = name;
      img.loading = 'lazy';
      img.onerror = function () { this.style.background = '#333'; this.style.minWidth = '150px'; this.style.minHeight = '210px'; };

      var badge = document.createElement('span');
      badge.className = 'card-stack-badge';
      badge.textContent = String(count);

      var controls = document.createElement('div');
      controls.className = 'card-stack-controls';
      var btnPlus = document.createElement('button');
      btnPlus.textContent = '+';
      btnPlus.type = 'button';
      var btnMinus = document.createElement('button');
      btnMinus.textContent = '-';
      btnMinus.type = 'button';

      function setCount(c) {
        c = Math.max(0, c);
        wrap.setAttribute('data-count', String(c));
        badge.textContent = String(c);
        if (c === 0) {
          li.remove();
          var list = li.parentNode;
          if (list && list.id && list.id.indexOf('list-') === 0) updateSectionHeaderTotal(list);
          return;
        }
        updateSectionHeaderTotal(li.parentNode);
      }

      btnPlus.addEventListener('mousedown', function (e) { e.preventDefault(); e.stopPropagation(); });
      btnPlus.addEventListener('click', function (e) { e.stopPropagation(); setCount(parseInt(wrap.getAttribute('data-count'), 10) + 1); });
      btnMinus.addEventListener('mousedown', function (e) { e.preventDefault(); e.stopPropagation(); });
      btnMinus.addEventListener('click', function (e) { e.stopPropagation(); setCount(parseInt(wrap.getAttribute('data-count'), 10) - 1); });

      controls.appendChild(btnMinus);
      controls.appendChild(btnPlus);
      var banner = document.createElement('div');
      banner.className = 'card-stack-banner';
      banner.appendChild(badge);
      banner.appendChild(controls);
      wrap.appendChild(img);
      wrap.appendChild(banner);
      li.appendChild(wrap);
      return li;
    }

    function updateTotalsPanel() {
      var statsSection = document.getElementById('deckStatisticsSection');
      if (!statsSection) return;
      var total = 0;
      var landCount = 0;
      TYPE_KEYS.forEach(function (key) {
        var list = document.getElementById('list-' + key);
        if (list) {
          var n = 0;
          list.querySelectorAll('.card-stack[data-count]').forEach(function (el) {
            n += parseInt(el.getAttribute('data-count') || '1', 10);
          });
          total += n;
          if (key === 'lands') landCount = n;
        }
      });
      var nonLand = total - landCount;
      var totalsEl = statsSection.querySelector('.deck-stats-totals');
      if (totalsEl) {
        totalsEl.innerHTML =
          '<span class="deck-total-item"><strong>Total cards:</strong> ' + total + '</span>' +
          '<span class="deck-total-item"><strong>Non-land:</strong> ' + nonLand + '</span>' +
          '<span class="deck-total-item"><strong>Lands:</strong> ' + landCount + '</span>';

    function renderDeck(data) {
      const container = document.getElementById('deckSections');
      const statsContainer = document.getElementById('statisticsContainer');
      if (statsPieChartInstance) { statsPieChartInstance.destroy(); statsPieChartInstance = null; }
      if (statsMvChartInstance) { statsMvChartInstance.destroy(); statsMvChartInstance = null; }
      container.innerHTML = '';
      if (statsContainer) statsContainer.innerHTML = '';
      const deck = data.deck || {};
      const removed = data.removed || [];
      const stats = data.stats || {};

      TYPE_KEYS.forEach(function (key) {
        const cards = Array.isArray(deck[key]) ? deck[key] : [];
        const stacks = collapseToStacks(cards);
        const section = document.createElement('div');
        section.className = 'section';
        section.dataset.type = key;
        const total = cards.length;
        section.innerHTML =
          '<div class="section-header">' + (TYPE_LABELS[key] || key) + ' (' + total + ')</div>' +
          '<div class="section-body"><ul class="card-list" id="list-' + key + '"></ul></div>';
        const list = section.querySelector('.card-list');
        stacks.forEach(function (s) {
          list.appendChild(makeCardStackEl(s.name, s.count));
        });
        container.appendChild(section);
      });

      var statsSection = document.createElement('div');
      statsSection.id = 'deckStatisticsSection';
      statsSection.className = 'section section-statistics';
      var dist = stats.color_distribution || {};
      var colorLine = ['W', 'U', 'B', 'R', 'G'].map(function (c) {
        var pct = dist[c] != null ? dist[c] : 0;
        return c + ' ' + pct + '%';
      }).join(' · ');
      statsSection.innerHTML =
        '<div class="section-header">Statistics</div>' +
        '<div class="section-body">' +
          '<div class="deck-stats-totals"></div>' +
          '<div class="deck-stats-colors"><strong>Color distribution</strong> (colored mana in costs):<br><span class="deck-stats-color-line">' + colorLine + '</span></div>' +
          '<div class="deck-stats-charts">' +
            '<div class="deck-stats-chart-wrap"><h4>Color distribution</h4><canvas id="statsPieChart" aria-label="Pie chart of colored mana symbols"></canvas></div>' +
            '<div class="deck-stats-chart-wrap"><h4>Mana value (non-land)</h4><canvas id="statsMvChart" aria-label="Histogram of mana values"></canvas></div>' +
          '</div>' +
        '</div>';
      if (statsContainer) statsContainer.appendChild(statsSection);
      renderStatsCharts(stats);

      var sideKeys = ['maybe', 'sideboard'];
      sideKeys.forEach(function (key) {
        var names = Array.isArray(deck[key + '_names']) ? deck[key + '_names'] : [];
        var listEl = document.getElementById('list-' + key);
        if (listEl) {
          listEl.innerHTML = '';
          collapseToStacks(names).forEach(function (s) {
            listEl.appendChild(makeMaybeBoardCardEl(s.name, s.count));
          });
          var sectionEl = document.getElementById('section-' + key);
          if (sectionEl) {
            var hdr = sectionEl.querySelector('.section-header');
            if (hdr) hdr.textContent = SIDE_LABELS[key] + ' (' + names.length + ')';
          }
        }
      });

      document.getElementById('saveBtn').disabled = false;
      updateTotalsPanel();
      initSortable();
    }

    function renderStatsCharts(stats) {
      if (typeof Chart === 'undefined') return;
      var dist = stats.color_distribution || {};
      var mvDist = stats.mana_value_distribution || [];
      while (mvDist.length < 8) mvDist.push(0);

      var pieEl = document.getElementById('statsPieChart');
      if (pieEl) {
        var colorColors = ['#f0e6d3', '#0e4b8c', '#2d2d2d', '#c41e3a', '#2d5016'];
        var pieData = ['W', 'U', 'B', 'R', 'G'].map(function (c) { return dist[c] != null ? dist[c] : 0; });
        var hasAny = pieData.some(function (v) { return v > 0; });
        var pieLabels = ['W', 'U', 'B', 'R', 'G'];
        if (!hasAny) { pieData = [1]; pieLabels = ['No colored mana']; colorColors = ['#555']; }
        statsPieChartInstance = new Chart(pieEl, {
          type: 'pie',
          data: {
            labels: pieLabels,
            datasets: [{ data: pieData, backgroundColor: colorColors, borderColor: 'var(--border)', borderWidth: 1 }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: { legend: { position: 'bottom', labels: { color: '#fff', padding: 8 } } }
          }
        });
      }
      var mvEl = document.getElementById('statsMvChart');
      if (mvEl) {
        var mvLabels = ['0', '1', '2', '3', '4', '5', '6', '7+'];
        var mvCreatures = (stats.mana_value_distribution && stats.mana_value_distribution.creatures) ? stats.mana_value_distribution.creatures.slice(0, 8) : [];
        var mvNonCreatures = (stats.mana_value_distribution && stats.mana_value_distribution.non_creatures) ? stats.mana_value_distribution.non_creatures.slice(0, 8) : [];
        while (mvCreatures.length < 8) mvCreatures.push(0);
        while (mvNonCreatures.length < 8) mvNonCreatures.push(0);
        statsMvChartInstance = new Chart(mvEl, {
          type: 'bar',
          data: {
            labels: mvLabels,
            datasets: [
              { label: 'Creatures', data: mvCreatures, backgroundColor: '#7cb342', borderColor: 'var(--border)', borderWidth: 1, stack: 'mv' },
              { label: 'Non-creatures', data: mvNonCreatures, backgroundColor: '#d8d8d8', borderColor: 'var(--border)', borderWidth: 1, stack: 'mv' }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
              x: { title: { display: true, text: 'Mana value', color: '#fff' }, ticks: { color: '#fff' }, grid: { color: '#fff' }, stacked: true },
              y: { beginAtZero: true, ticks: { color: '#fff', stepSize: 1 }, grid: { color: '#fff' }, stacked: true }
            },
            plugins: { legend: { display: true, position: 'bottom', labels: { color: '#fff', padding: 8 } } }
          }
        });
      }
    }

    function typeLineToSectionKey(typeLine) {
      if (!typeLine || typeof typeLine !== 'string') return 'spells';
      var t = typeLine.toLowerCase();
      if (t.indexOf('land') !== -1) return 'lands';
      if (t.indexOf('creature') !== -1) return 'creatures';
      if (t.indexOf('planeswalker') !== -1 || t.indexOf('artifact') !== -1 || t.indexOf('enchantment') !== -1) return 'non_creatures';
      if (t.indexOf('instant') !== -1 || t.indexOf('sorcery') !== -1) return 'spells';
      return 'spells';
    }

    function addCardToDeck(cardName, typeKey) {
      var listId = 'list-' + typeKey;
      var list = document.getElementById(listId);
      if (!list) return;
      var existing = null;
      list.querySelectorAll('.card-stack[data-name]').forEach(function (el) {
        if (el.getAttribute('data-name') === cardName) existing = el;
      });
      if (existing) {
        var c = parseInt(existing.getAttribute('data-count'), 10) || 1;
        existing.setAttribute('data-count', String(c + 1));
        existing.querySelector('.card-stack-badge').textContent = String(c + 1);
        updateSectionHeaderTotal(list);
      } else {
        list.appendChild(makeCardStackEl(cardName, 1));
        updateSectionHeaderTotal(list);
      }
    }

    function doSearch() {
      var input = document.getElementById('cardSearch');
      var msgEl = document.getElementById('searchMsg');
      var query = (input.value || '').trim();
      if (!query) {
        msgEl.textContent = 'Enter a card name.';
        msgEl.className = 'search-msg';
        return;
      }
      msgEl.textContent = 'Searching…';
      msgEl.className = 'search-msg';
      fetch('https://api.scryfall.com/cards/named?fuzzy=' + encodeURIComponent(query))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.object === 'error') {
            msgEl.textContent = data.details || 'Card not found.';
            msgEl.className = 'search-msg error';
            return;
          }
          var name = data.name;
          addCardToDeck(name, typeLineToSectionKey(data.type_line));
          fetch('/api/add_card', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
          }).then(function (r) {
            if (!r.ok) return r.json().then(function (err) { throw new Error(err.detail || 'Add failed'); });
            msgEl.textContent = 'Added: ' + name;
            msgEl.className = 'search-msg';
            input.value = '';
            input.focus();
          }).catch(function (err) {
            msgEl.textContent = err.message || 'Add failed';
            msgEl.className = 'search-msg error';
          });
        })
        .catch(function () {
          msgEl.textContent = 'Search failed.';
          msgEl.className = 'search-msg error';
        });
    }

    var autocompleteDebounceTimer = null;
    var autocompleteAbort = null;
    var autocompleteHighlight = -1;

    function showAutocomplete(names) {
      var ul = document.getElementById('autocompleteDropdown');
      ul.innerHTML = '';
      ul.style.display = 'block';
      autocompleteHighlight = -1;
      (names || []).slice(0, 15).forEach(function (name, i) {
        var li = document.createElement('li');
        li.textContent = name;
        li.dataset.name = name;
        li.addEventListener('click', function () { selectAutocomplete(name); });
        ul.appendChild(li);
      });
    }

    function hideAutocomplete() {
      var ul = document.getElementById('autocompleteDropdown');
      ul.style.display = 'none';
      ul.innerHTML = '';
      autocompleteHighlight = -1;
    }

    function selectAutocomplete(name) {
      hideAutocomplete();
      document.getElementById('cardSearch').value = '';
      var msgEl = document.getElementById('searchMsg');
      msgEl.textContent = 'Adding…';
      msgEl.className = 'search-msg';
      fetch('https://api.scryfall.com/cards/named?exact=' + encodeURIComponent(name))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.object === 'error') {
            msgEl.textContent = data.details || 'Card not found.';
            msgEl.className = 'search-msg error';
            return;
          }
          addCardToDeck(name, typeLineToSectionKey(data.type_line));
          return fetch('/api/add_card', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
          }).then(function (r) {
            if (!r.ok) return r.json().then(function (err) { throw new Error(err.detail || 'Add failed'); });
            msgEl.textContent = 'Added: ' + name;
            msgEl.className = 'search-msg';
          });
        })
        .catch(function () {
          msgEl.textContent = 'Failed to add card.';
          msgEl.className = 'search-msg error';
        });
    }

    function runAutocomplete(query) {
      if (autocompleteAbort) autocompleteAbort.abort();
      if (!query || query.length < 2) { hideAutocomplete(); return; }
      autocompleteAbort = new AbortController();
      fetch('https://api.scryfall.com/cards/autocomplete?q=' + encodeURIComponent(query), { signal: autocompleteAbort.signal })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.data && data.data.length) showAutocomplete(data.data);
          else hideAutocomplete();
        })
        .catch(function (err) {
          if (err.name !== 'AbortError') hideAutocomplete();
        });
    }

    (function initSearch() {
      var input = document.getElementById('cardSearch');
      var addBtn = document.getElementById('addCardBtn');
      var dropdown = document.getElementById('autocompleteDropdown');
      addBtn.addEventListener('click', doSearch);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          var items = dropdown.querySelectorAll('li');
          if (items.length && autocompleteHighlight >= 0 && items[autocompleteHighlight]) {
            e.preventDefault();
            selectAutocomplete(items[autocompleteHighlight].dataset.name);
            return;
          }
          e.preventDefault();
          doSearch();
        } else if (e.key === 'Escape') {
          hideAutocomplete();
          input.blur();
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          var items = dropdown.querySelectorAll('li');
          if (items.length) {
            autocompleteHighlight = (autocompleteHighlight + 1) % items.length;
            items.forEach(function (el, i) { el.classList.toggle('highlight', i === autocompleteHighlight); });
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          var items = dropdown.querySelectorAll('li');
          if (items.length) {
            autocompleteHighlight = autocompleteHighlight <= 0 ? items.length - 1 : autocompleteHighlight - 1;
            items.forEach(function (el, i) { el.classList.toggle('highlight', i === autocompleteHighlight); });
          }
        }
      });
      input.addEventListener('input', function () {
        if (autocompleteDebounceTimer) clearTimeout(autocompleteDebounceTimer);
        var q = (input.value || '').trim();
        autocompleteDebounceTimer = setTimeout(function () { runAutocomplete(q); }, 280);
      });
      input.addEventListener('blur', function () {
        setTimeout(hideAutocomplete, 180);
      });
    })();

    (function initAdvSearchModal() {
      var modal = document.getElementById('advSearchModal');
      var iframe = document.getElementById('advSearchIframe');
      var closeBtn = document.getElementById('advSearchModalClose');
      document.getElementById('advancedSearchBtn').addEventListener('click', function () {
        iframe.src = '/search?t=' + Date.now();
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
      });
      function closeModal() {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
        iframe.src = 'about:blank';
      }
      closeBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeModal();
      });
    })();

    let sortables = [];

    function initSortable() {
      sortables.forEach(function (s) { if (s.destroy) s.destroy(); });
      sortables = [];

      const options = {
        group: { name: 'cards', pull: true, put: true },
        handle: '.card-img, .maybe-board-name',
        animation: 150,
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag'
      };

      TYPE_KEYS.forEach(function (key) {
        const el = document.getElementById('list-' + key);
        if (el) sortables.push(Sortable.create(el, options));
      });

      function convertFullCardsInZone(zoneId) {
        var zone = document.getElementById(zoneId);
        if (!zone) return;
        var toReplace = [];
        for (var i = 0; i < zone.children.length; i++) {
          var li = zone.children[i];
          var stack = li.querySelector('.card-stack');
          var hasImg = li.querySelector('.card-img');
          if (stack && hasImg && !stack.classList.contains('maybe-board-item')) {
            var name = stack.getAttribute('data-name');
            var count = parseInt(stack.getAttribute('data-count'), 10) || 1;
            toReplace.push({ li: li, name: name, count: count });
          }
        }
        toReplace.forEach(function (r) {
          var newLi = makeMaybeBoardCardEl(r.name, r.count);
          r.li.parentNode.replaceChild(newLi, r.li);
        });
      }

      var sideZoneIds = ['list-maybe', 'list-sideboard'];
      sideZoneIds.forEach(function (zoneId) {
        var el = document.getElementById(zoneId);
        if (el) {
          sortables.push(Sortable.create(el, {
            group: { name: 'cards', pull: true, put: true },
            handle: '.card-img, .maybe-board-name',
            animation: 150,
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag',
            onEnd: function () {
              setTimeout(function () { convertFullCardsInZone(zoneId); }, 0);
            }
          }));
          setTimeout(function () { convertFullCardsInZone(zoneId); }, 50);
        }
      });
    }

    function collectState() {
      const deck = { name: '', colors: [], description: '' };
      function expandList(listEl) {
        var arr = [];
        if (!listEl) return arr;
        listEl.querySelectorAll('.card-stack[data-name][data-count]').forEach(function (el) {
          var name = el.getAttribute('data-name');
          var count = parseInt(el.getAttribute('data-count'), 10) || 1;
          for (var i = 0; i < count; i++) arr.push(name);
        });
        return arr;
      }
      TYPE_KEYS.forEach(function (key) {
        deck[key] = expandList(document.getElementById('list-' + key));
      });
      deck.maybe = expandList(document.getElementById('list-maybe'));
      deck.sideboard = expandList(document.getElementById('list-sideboard'));
      return deck;
    }

    function getDeckMeta() {
      return fetch('/api/deck').then(function (r) {
        if (!r.ok) return { deck: null, removed: [] };
        return r.json();
      }).then(function (data) {
        if (data.deck) {
          return {
            name: data.deck.name,
            colors: data.deck.colors || [],
            description: data.deck.description || ''
          };
        }
        return { name: '', colors: [], description: '' };
      }).catch(function () { return { name: '', colors: [], description: '' }; });
    }

    function suggestedSaveName() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      var h = String(d.getHours()).padStart(2, '0');
      var min = String(d.getMinutes()).padStart(2, '0');
      var s = String(d.getSeconds()).padStart(2, '0');
      return 'deck_' + y + m + day + '_' + h + min + s + '.json';
    }

    document.getElementById('deckSections').addEventListener('click', function (e) {
      var header = e.target.closest('.section-header');
      if (header) {
        var section = header.closest('.section');
        if (section) section.classList.toggle('collapsed');
      }
    });
    document.querySelector('.removed-column').addEventListener('click', function (e) {
      var header = e.target.closest('.section-header');
      if (header) {
        var section = header.closest('.section');
        if (section) section.classList.toggle('collapsed');
      }
    });
    document.getElementById('collapseAllBtn').addEventListener('click', function () {
      document.querySelectorAll('#deckSections .section').forEach(function (s) { s.classList.add('collapsed'); });
    });
    document.getElementById('expandAllBtn').addEventListener('click', function () {
      document.querySelectorAll('#deckSections .section').forEach(function (s) { s.classList.remove('collapsed'); });
    });

    document.getElementById('saveBtn').addEventListener('click', function () {
      var resultEl = document.getElementById('saveResult');
      resultEl.textContent = '';
      fetch('/api/export?format=json')
        .then(function (r) {
          if (!r.ok) return r.json().then(function (err) { throw new Error(err.detail || 'Export failed'); });
          return r.json();
        })
        .then(function (data) {
          var blob = new Blob([data.text], { type: 'application/json' });
          if (typeof window.showSaveFilePicker === 'function') {
          window.showSaveFilePicker({
            suggestedName: suggestedSaveName(),
            types: [{ description: 'JSON deck', accept: { 'application/json': ['.json'] } }]
          }).then(function (handle) {
            return handle.createWritable();
          }).then(function (writable) {
            return writable.write(blob).then(function () { return writable.close(); });
          }).then(function () {
            resultEl.textContent = 'Saved.';
          }).catch(function (err) {
            if (err.name === 'AbortError') {
              resultEl.textContent = 'Cancelled.';
            } else {
              resultEl.textContent = 'Error: ' + (err.message || 'save failed');
              resultEl.style.color = '#f88';
            }
          });
        } else {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = suggestedSaveName();
          a.click();
          URL.revokeObjectURL(url);
          resultEl.textContent = 'Download started (browser may not support save dialog).';
        }
      }).catch(function (err) {
        resultEl.textContent = 'Error: ' + (err.message || 'save failed');
        resultEl.style.color = '#f88';
      });
    });

    (function initExportFormatModal() {
      var modal = document.getElementById('exportFormatModal');
      var closeBtn = document.getElementById('exportFormatModalClose');
      var buttonsContainer = document.getElementById('exportFormatButtons');
      var resultEl = document.getElementById('saveResult');

      function closeExportModal() {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
      }

      function exportAndCopy(formatKey, displayName) {
        resultEl.textContent = '';
        fetch('/api/export?format=' + encodeURIComponent(formatKey))
          .then(function (r) {
            if (!r.ok) return r.json().then(function (err) { throw new Error(err.detail || 'Export failed'); });
            return r.json();
          })
          .then(function (data) {
            var text = data.text;
            if (!navigator.clipboard || !navigator.clipboard.writeText) {
              resultEl.textContent = 'Clipboard not available.';
              resultEl.style.color = '#f88';
              return;
            }
            return navigator.clipboard.writeText(text).then(function () {
              closeExportModal();
              resultEl.textContent = 'Copied to clipboard (' + (displayName || formatKey) + ').';
              resultEl.style.color = '';
            });
          })
          .catch(function (err) {
            closeExportModal();
            resultEl.textContent = err.message || 'Export failed.';
            resultEl.style.color = '#f88';
          });
      }

      document.getElementById('exportDecklistBtn').addEventListener('click', function () {
        buttonsContainer.innerHTML = '';
        fetch('/api/export/formats')
          .then(function (r) {
            if (!r.ok) throw new Error('Could not load export formats');
            return r.json();
          })
          .then(function (data) {
            var formats = data.formats || {};
            var keys = Object.keys(formats);
            if (!keys.length) {
              resultEl.textContent = 'No export formats available.';
              resultEl.style.color = '#f88';
              return;
            }
            keys.forEach(function (key) {
              var btn = document.createElement('button');
              btn.type = 'button';
              btn.textContent = formats[key] || key;
              btn.addEventListener('click', function () { exportAndCopy(key, formats[key]); });
              buttonsContainer.appendChild(btn);
            });
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
          })
          .catch(function () {
            resultEl.textContent = 'Failed to load export formats.';
            resultEl.style.color = '#f88';
          });
      });

      closeBtn.addEventListener('click', closeExportModal);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeExportModal();
      });
    })();

    (function initImportFormatModal() {
      var modal = document.getElementById('importFormatModal');
      var closeBtn = document.getElementById('importFormatModalClose');
      var cancelBtn = document.getElementById('importCancelBtn');
      var textarea = document.getElementById('importTextarea');
      var selectEl = document.getElementById('importFormatSelect');
      var submitBtn = document.getElementById('importSubmitBtn');
      var errorEl = document.getElementById('importError');
      var resultEl = document.getElementById('saveResult');

      function closeImportModal() {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
        errorEl.textContent = '';
      }

      document.getElementById('importDeckBtn').addEventListener('click', function () {
        errorEl.textContent = '';
        textarea.value = '';
        selectEl.innerHTML = '<option value="">Loading…</option>';
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
        fetch('/api/export/formats')
          .then(function (r) {
            if (!r.ok) throw new Error('Could not load formats');
            return r.json();
          })
          .then(function (data) {
            var formats = data.formats || {};
            selectEl.innerHTML = '';
            Object.keys(formats).forEach(function (key) {
              var opt = document.createElement('option');
              opt.value = key;
              opt.textContent = formats[key] || key;
              selectEl.appendChild(opt);
            });
            if (selectEl.options.length) selectEl.selectedIndex = 0;
            textarea.focus();
          })
          .catch(function () {
            errorEl.textContent = 'Failed to load formats.';
          });
      });

      submitBtn.addEventListener('click', function () {
        var text = textarea.value.trim();
        var format = selectEl.value;
        errorEl.textContent = '';
        console.log('[import] Submit clicked; format=', format, 'text length=', text.length, 'preview=', text.substring(0, 60) + (text.length > 60 ? '...' : ''));
        if (!format) {
          errorEl.textContent = 'Select a format.';
          return;
        }
        var payload = { text: text, format: format };
        console.log('[import] Sending POST /api/import', payload.format);
        fetch('/api/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(function (r) {
            console.log('[import] Response status=', r.status, 'ok=', r.ok, 'content-type=', r.headers.get('content-type'));
            if (!r.ok) {
              return r.json().then(function (err) {
                console.log('[import] Error body:', err);
                var msg = 'Import failed.';
                if (typeof err.detail === 'string') msg = err.detail;
                else if (Array.isArray(err.detail) && err.detail[0] && err.detail[0].msg) msg = err.detail[0].msg;
                throw new Error(msg);
              });
            }
            return r.json();
          })
          .then(function (data) {
            console.log('[import] Success; data keys=', data ? Object.keys(data) : 'null', 'deck keys=', data && data.deck ? Object.keys(data.deck) : 'n/a');
            renderDeck(data);
            closeImportModal();
            resultEl.textContent = 'Deck imported.';
            resultEl.style.color = '';
          })
          .catch(function (err) {
            console.log('[import] Catch:', err && err.message, err);
            errorEl.textContent = err.message || 'Import failed.';
          });
      });

      cancelBtn.addEventListener('click', closeImportModal);
      closeBtn.addEventListener('click', closeImportModal);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeImportModal();
      });
    })();

    document.getElementById('loadBtn').addEventListener('click', function () {
      document.getElementById('loadFileInput').click();
    });
    document.getElementById('loadFileInput').addEventListener('change', function () {
      var file = this.files && this.files[0];
      if (!file) return;
      var fr = new FileReader();
      fr.onload = function () {
        var json;
        try { json = JSON.parse(fr.result); } catch (e) {
          document.getElementById('searchMsg').textContent = 'Invalid JSON file.';
          document.getElementById('searchMsg').className = 'search-msg error';
          return;
        }
        fetch('/api/deck', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(json)
        }).then(function (r) {
          if (!r.ok) throw new Error('Load failed');
          return fetch('/api/deck');
        }).then(function (r) { return r.json(); })
          .then(renderDeck)
          .then(function () {
            document.getElementById('searchMsg').textContent = 'Deck loaded.';
            document.getElementById('searchMsg').className = 'search-msg';
          })
          .catch(function () {
            document.getElementById('searchMsg').textContent = 'Load failed.';
            document.getElementById('searchMsg').className = 'search-msg error';
          });
      };
      fr.readAsText(file);
      this.value = '';
    });

    (function initTabs() {
      var buttons = document.querySelectorAll('.tab-btn');
      var panels = document.querySelectorAll('.tab-panel');
      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var tab = btn.getAttribute('data-tab');
          buttons.forEach(function (b) { b.classList.remove('active'); });
          panels.forEach(function (p) {
            p.classList.toggle('active', p.id === tab + 'Tab');
          });
          btn.classList.add('active');
        });
      });
    })();

    (function initSSE() {
      var evtSource = new EventSource('/api/events');
      evtSource.addEventListener('deck_updated', function (e) {
        var data = JSON.parse(e.data);
        renderDeck(data);
      });
    })();
  </script>
</body>
</html>
